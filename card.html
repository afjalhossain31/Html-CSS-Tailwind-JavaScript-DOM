<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Card</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-2xl mx-auto">
        <input id="product" type="text" placeholder="Product Name" class="w-full px-4 py-3 mb-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 text-lg">

        <input id="quantity" type="text" placeholder="Product Quantity" class="w-full px-4 py-3 mb-4 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-500 text-lg">

        <button onclick="addToCart()" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg transition duration-300">Add product</button>
        
        <div class="bg-white mt-6 p-6 rounded-lg shadow-lg">
            <h3 class="text-2xl font-bold text-gray-800 border-b-2 border-green-500 pb-3 mb-4">Added Products</h3>
            <ul id="product-container" class="space-y-2">
                
            </ul>
        </div>
    </div>


    <!-- Link js file to html file -->
    <script src="js/card.js"></script>
    
</body>
</html>
